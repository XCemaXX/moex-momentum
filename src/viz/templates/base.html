<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{ title }} — MOEX Momentum</title>
<script src="plotly.min.js" charset="utf-8"></script>
<style>
  body { margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; color: #222; }
  nav.site-nav {
    display: flex; flex-wrap: wrap; gap: 0.25em 1em;
    padding: 0.6em 1em; border-bottom: 1px solid #e0e0e0;
    background: #fafafa; font-size: 14px;
  }
  nav.site-nav a {
    color: #1f77b4; text-decoration: none;
    padding: 0.2em 0.5em; border-radius: 3px;
  }
  nav.site-nav a:hover { background: #eaeaea; }
  nav.site-nav a.current { color: #333; font-weight: 600; background: #e8e8e8; }
  main { padding: 1em 1.2em; max-width: 1100px; margin: 0 auto; }
  main.full { max-width: none; padding: 0; }
  h1 { font-size: 22px; margin: 0.4em 0 0.6em; }
  h2 { font-size: 18px; margin: 1.2em 0 0.4em; }
  p { line-height: 1.5; }
  code { background: #f4f4f4; padding: 0.1em 0.3em; border-radius: 3px; font-size: 0.9em; }
  pre { background: #f4f4f4; padding: 0.8em; overflow-x: auto; }
  table { border-collapse: collapse; width: 100%; font-size: 13px; }
  th, td { padding: 0.35em 0.6em; border-bottom: 1px solid #eee; text-align: left; }
  th { background: #fafafa; font-weight: 600; }
</style>
{% block head_extra %}{% endblock %}
</head>
<body>
<nav class="site-nav">
{% for label, href in nav_links %}
  <a href="{{ href }}"{% if href == current_href %} class="current"{% endif %}>{{ label }}</a>
{% endfor %}
</nav>
{% block body %}{% endblock %}
</body>
</html>
